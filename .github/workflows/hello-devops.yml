name: Hello GitHub Actions

# Controls when the workflow will run
on:
  push:
    branches: [ "master" ] # Runs when you push to main
  pull_request:
    branches: [ "master" ] # Runs when you open a PR
  workflow_dispatch:      # Allows you to run this manually from the UI

jobs:
  # The first job: Demonstration of environment setup
  initial-greeting:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get a copy of your code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Print a custom message
      - name: Run Greeting
        run: |
          echo "🚀 Starting DevOps Portfolio Workflow"
          echo "Hello from GitHub Actions!"

      # Step 3: Linux knowledge
      - name: Log Runner Details
        run: |
          echo "Checking runner system information..."
          lsb_release -a
          echo "Current Path: $(pwd)"
          echo "Today's Date: $(date)"

  # The second job: Simulation of a build/test
  verify-files:
    needs: initial-greeting # This job only starts if the first one finishes
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get a copy of your code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Repository Files
        run: |
          echo "Listing files in the repo to verify structure:"
          ls -R -a

  # The third job: Testing secret masking
  test-secrets:
    needs: initial-greeting # This job only starts if the first one finishes
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get a copy of your code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Test Secret Masking
        env:
          MY_SECRET: ${{ secrets.MY_DUMMY_API_KEY }}
        run: |
          echo "Testing secret masking..."
          echo "The secret value is: $MY_SECRET"

  system-metadata:
    needs: initial-greeting # This job only starts if the first one finishes
    runs-on: ubuntu-latest
    
    steps:
      - name: Show GitHub Context
        env:
          # We are pulling data directly from GitHub's internal variables
          USER_NAME: ${{ github.actor }}
          REPO_NAME: ${{ github.repository }}
          EVENT_TYPE: ${{ github.event_name }}
        run: |
          echo "Automation triggered by: $USER_NAME"
          echo "Working in repository: $REPO_NAME"
          echo "Event that started this: $EVENT_TYPE"